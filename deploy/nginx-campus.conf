# Nginx configuration for Campus Management System
# Copy to: /etc/nginx/sites-available/campus
# Link to: /etc/nginx/sites-enabled/campus

upstream campus_http {
    server 127.0.0.1:8001;  # Gunicorn
}

upstream campus_websocket {
    server 127.0.0.1:8002;  # Daphne
}

server {
    listen 80;
    server_name campus.votredomaine.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name campus.votredomaine.com;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/campus.votredomaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/campus.votredomaine.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Logs
    access_log /var/log/nginx/campus_access.log;
    error_log /var/log/nginx/campus_error.log;
    
    # Max upload size
    client_max_body_size 50M;
    
    # Static files
    location /static/ {
        alias /var/www/campus-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Media files
    location /media/ {
        alias /var/www/campus-backend/media/;
        expires 7d;
    }
    
    # WebSocket connections
    location /ws/ {
        proxy_pass http://campus_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 86400;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    
    # API and Admin
    location / {
        proxy_pass http://campus_http;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300;
        proxy_read_timeout 300;
    }
}
