# Nginx configuration for ESCAM (Campus LMS)
# Copy to: /etc/nginx/sites-available/escam
# Link to: /etc/nginx/sites-enabled/escam

# HTTP -> HTTPS
server {
    if ($host = api.escam.net) {
        return 301 https://$host$request_uri;
    }

    if ($host = escam.net) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name escam.net api.escam.net;
    return 301 https://$host$request_uri;
}

# Frontend - escam.net
server {
    listen 443 ssl http2;
    server_name escam.net;
    ssl_certificate /etc/letsencrypt/live/escam.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/escam.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    root /var/www/escam/frontend;
    index index.html;

    location /media/ {
        alias /var/www/escam/backend/media/;
        expires 7d;
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        add_header X-Content-Type-Options nosniff;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# API - api.escam.net
server {
    listen 443 ssl http2;
    server_name api.escam.net;
    ssl_certificate /etc/letsencrypt/live/escam.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/escam.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    client_max_body_size 50M;

    location /static/ {
        alias /var/www/escam/backend/staticfiles/;
        expires 30d;
    }

    location /media/ {
        alias /var/www/escam/backend/media/;
        expires 7d;
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        add_header X-Content-Type-Options nosniff;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:9013;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 86400;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:9012;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
